name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- FRONTEND ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          if [ -f frontend/package.json ]; then
            npm --prefix frontend install
            npm --prefix frontend run build
          else
            echo "Frontend build skipped, žádný package.json"
          fi

      # --- BACKEND ---
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          export PYTHONPATH=$(pwd)
          pytest -v tests/

      # --- BUILD DOCKER IMAGES ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and tag backend Docker image
        run: docker build -t devops-web_be:latest ./backend

      - name: Build and tag frontend Docker image
        run: docker build -t devops-web_fe:latest ./frontend

      # --- PUSH DOCKER IMAGES (pokud používáš registry) ---
      # - run: docker push devops-web_be:latest
      # - run: docker push devops-web_fe:latest

  deploy-to-k8s:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- Install kubectl ---
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.34.0'

      # --- Deploy to Kubernetes ---
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      # --- Verify deployment ---
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/weather-backend
          kubectl rollout status deployment/weather-frontend
          kubectl get pods -o wide