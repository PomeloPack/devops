name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # --- CHECKOUT ---
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- FRONTEND ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          if [ -f frontend/package.json ]; then
            npm --prefix frontend install
            npm --prefix frontend run build
          else
            echo "Frontend build skipped (package.json missing)"
          fi

      # --- BACKEND ---
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          SQLALCHEMY_DATABASE_URI: "sqlite:///test.db"
          FLASK_ENV: "testing"
          API_KEY: "dummy-key-for-test"
        run: |
          export PYTHONPATH=$(pwd):$(pwd)/backend
          pytest -v tests/

      # --- DOCKER BUILD ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend Docker image
        run: docker build -t devops-web_be:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t devops-web_fe:latest ./frontend

  # --- DEPLOY DISABLED ---
  deploy-to-k8s:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Deploy disabled
        run: echo "Deploy to Kubernetes is intentionally disabled. Run deployment locally via Minikube."