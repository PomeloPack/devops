apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weather-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-db
  template:
    metadata:
      labels:
        app: weather-db
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
          - name: POSTGRES_USER
            value: "pomelo"
          - name: POSTGRES_PASSWORD
            value: "pomeloheslo"
          - name: POSTGRES_DB
            value: "weather_app"
        ports:
          - containerPort: 5432
        volumeMounts:
          - mountPath: /var/lib/postgresql/data
            name: db-data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: weather-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: weather-db
spec:
  type: ClusterIP
  selector:
    app: weather-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432